<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juodylive - تنزيل التطبيق الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2ea44f;
            --secondary-color: #24292f;
            --accent-color: #0969da;
            --text-main: #1f2328;
            --bg-gradient: linear-gradient(135deg, #f6f8fa 0%, #e6eef5 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 50px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 24px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(46, 164, 79, 0.2);
            font-size: 50px;
            color: white;
        }

        h1 { font-size: 2.2rem; font-weight: 800; color: var(--secondary-color); margin-bottom: 8px; }
        .tagline { color: #57606a; font-size: 1.1rem; margin-bottom: 35px; line-height: 1.6; }

        .download-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 18px 45px;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(46, 164, 79, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(46, 164, 79, 0.4);
            background-color: #2c974b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .info-item { text-align: center; }
        .info-item span { display: block; font-size: 0.85rem; color: #888; }
        .info-item strong { font-size: 1rem; color: #444; }

        .security-badge {
            margin-top: 25px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0fdf4;
            color: #166534;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-icon">
            <i class="fas fa-play"></i>
        </div>

        <h1>Juodylive</h1>
        <p class="tagline">عالم من البث المباشر والترفيه في متناول يدك. جرب التواصل بشكل جديد.</p>

        <a href="رابط_الـ_APK_الخاص_بك" class="download-btn">
            <i class="fab fa-android"></i>
            تنزيل تطبيق Android
        </a>

        <div class="security-badge">
            <i class="fas fa-shield-check"></i>
            ملف فحص آمن وموثوق 100%
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span>الإصدار</span>
                <strong>v1.0.2</strong>
            </div>
            <div class="info-item">
                <span>الحجم</span>
                <strong>24 MB</strong>
            </div>
        </div>
    </div>

</body>
</html>
