<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق Juodylive</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            background-color: #2ea44f;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }
        .btn:hover {
            background-color: #2c974b;
            transform: scale(1.05);
        }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Juodylive</h1>
        <p>تطبيق البث المباشر والمحتوى الترفيهي</p>
        <a href="رابط_الملف_هنا" class="btn">تحميل التطبيق (APK)</a>
        <div class="footer">إصدار v1.0.0 | آمن وموثوق</div>
    </div>
</body>
</html>
